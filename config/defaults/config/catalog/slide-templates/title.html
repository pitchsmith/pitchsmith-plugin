<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=1920, height=1080">
  <title>Title Slide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-primary: var(--color-primary, #3a61ff);
      --color-secondary: var(--color-secondary, #334155);
      --color-accent: var(--color-accent, #8455ff);
      --color-bg-default: var(--color-bg-default, #f8fafc);
      --color-bg-alt: var(--color-bg-alt, #f1f5f9);
      --color-bg-dark: var(--color-bg-dark, #131023);
      --color-bg-dark-alt: var(--color-bg-dark-alt, #0d0b1a);
      --color-bg-light: var(--color-bg-light, #ffffff);
      --color-text-heading: var(--color-text-heading, #131023);
      --color-text-body: var(--color-text-body, #334155);
      --color-text-on-dark: var(--color-text-on-dark, #f0eeff);
      --color-text-on-light: var(--color-text-on-light, #131023);
      --color-surface-dark: var(--color-surface-dark, #1a1730);
      --color-border-dark: var(--color-border-dark, #2d2b45);
      --font-heading: 'Fraunces', Georgia, serif;
      --font-body: 'DM Sans', -apple-system, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: var(--color-bg-dark, #131023);
    }

    .slide {
      width: 1920px;
      height: 1080px;
      position: relative;
      font-family: var(--font-body);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }

    /* ── Left: Image panel ── */
    .image-panel {
      position: relative;
      background-color: var(--color-bg-dark-alt, #0d0b1a);
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow: hidden;
    }

    /* Placeholder state — crosshatch pattern */
    .image-panel--placeholder {
      background-image:
        linear-gradient(135deg, var(--color-surface-dark, #1a1730) 25%, transparent 25%),
        linear-gradient(225deg, var(--color-surface-dark, #1a1730) 25%, transparent 25%),
        linear-gradient(45deg, var(--color-surface-dark, #1a1730) 25%, transparent 25%),
        linear-gradient(315deg, var(--color-surface-dark, #1a1730) 25%, transparent 25%);
      background-size: 40px 40px;
      background-position: 20px 0, 20px 0, 0 0, 0 0;
    }

    .placeholder-indicator {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      opacity: 0.3;
      pointer-events: none;
    }

    .placeholder-indicator svg {
      width: 64px;
      height: 64px;
      stroke: var(--color-text-on-dark, #f0eeff);
      fill: none;
      stroke-width: 1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .placeholder-label {
      font-family: var(--font-body);
      font-size: 15px;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-text-on-dark, #f0eeff);
    }

    /* ── Right: Content panel ── */
    .content-panel {
      background: var(--color-bg-dark, #131023);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 96px 88px 96px 80px;
      position: relative;
    }

    /* Thin accent stripe along the left edge of content panel */
    .content-panel::before {
      content: '';
      position: absolute;
      top: 120px;
      bottom: 120px;
      left: 0;
      width: 3px;
      background: linear-gradient(180deg,
        var(--color-primary, #3a61ff) 0%,
        var(--color-accent, #8455ff) 50%,
        transparent 100%
      );
      opacity: 0.6;
    }

    /* ── Logo ── */
    .logo-area {
      margin-bottom: 48px;
      width: 160px;
      height: 48px;
      display: flex;
      align-items: center;
    }

    .logo-area img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .logo-placeholder {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.1em;
      color: var(--color-text-on-dark, #f0eeff);
      opacity: 0.45;
      text-transform: uppercase;
    }

    /* ── Text content ── */
    .content-block {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .eyebrow {
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--color-primary, #3a61ff);
      margin-bottom: 24px;
    }

    .title {
      font-family: var(--font-heading);
      font-size: 64px;
      font-weight: 400;
      color: var(--color-text-on-dark, #f0eeff);
      line-height: 1.1;
      letter-spacing: -0.02em;
      margin-bottom: 32px;
    }

    .title-accent {
      width: 64px;
      height: 3px;
      background: linear-gradient(90deg,
        var(--color-primary, #3a61ff),
        var(--color-accent, #8455ff)
      );
      border-radius: 2px;
      margin-bottom: 32px;
      opacity: 0.85;
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: 21px;
      font-weight: 300;
      color: var(--color-text-on-dark, #f0eeff);
      opacity: 0.6;
      line-height: 1.65;
      letter-spacing: 0.005em;
    }

    /* ── Editable states ── */
    [contenteditable]:focus {
      outline: 2px solid var(--color-primary, #3a61ff);
      outline-offset: 4px;
    }

    [contenteditable]:hover {
      outline: 1px dashed var(--color-primary, #3a61ff);
      outline-offset: 2px;
    }
  </style>
</head>
<body>
  <div class="slide" data-slide-id="title-001">

    <!-- Left: Image panel -->
    <div class="image-panel image-panel--placeholder" data-field="background-image" data-animatable="true">
      <div class="placeholder-indicator">
        <svg viewBox="0 0 64 64">
          <rect x="4" y="4" width="56" height="56" rx="4" />
          <circle cx="22" cy="22" r="6" />
          <path d="M60 44L44 28L16 60" />
          <path d="M40 52L32 42L4 60" opacity="0.5" />
        </svg>
        <span class="placeholder-label">Full-bleed image</span>
      </div>
    </div>

    <!-- Right: Content panel -->
    <div class="content-panel">
      <div class="logo-area" data-animatable="true">
        <span class="logo-placeholder" contenteditable="true" data-field="logo">Your Logo</span>
      </div>

      <div class="content-block" data-animatable="true">
        <span class="eyebrow" contenteditable="true" data-field="eyebrow" data-animatable="true">Category or Tag</span>
        <h1 class="title" contenteditable="true" data-field="title" data-animatable="true">A Bold Statement That Commands Attention</h1>
        <div class="title-accent" data-animatable="true"></div>
        <p class="subtitle" contenteditable="true" data-field="subtitle" data-animatable="true">Set the stage with a supporting line that draws the audience deeper into the narrative.</p>
      </div>
    </div>

  </div>

  <script>
    const slideId = document.querySelector('.slide')?.dataset.slideId || 'unknown';

    const saveEdits = () => {
      try {
        const edits = [];
        document.querySelectorAll('[contenteditable]').forEach(el => {
          const field = el.getAttribute('data-field');
          if (field) {
            edits.push({ field, content: el.innerHTML });
          }
        });
        localStorage.setItem(`slide-${slideId}-edits`, JSON.stringify({
          slide: slideId,
          edits,
          lastModified: new Date().toISOString()
        }));
      } catch (e) {
        console.warn('Auto-save failed:', e.message);
      }
    };

    const restoreEdits = () => {
      try {
        const stored = localStorage.getItem(`slide-${slideId}-edits`);
        if (stored) {
          const data = JSON.parse(stored);
          data.edits?.forEach(edit => {
            const el = document.querySelector(`[data-field="${edit.field}"]`);
            if (el) el.innerHTML = edit.content;
          });
        }
      } catch (e) {
        console.warn('Restore failed:', e.message);
      }
    };

    document.querySelectorAll('[contenteditable]').forEach(el => {
      el.addEventListener('blur', saveEdits);
      el.addEventListener('input', () => setTimeout(saveEdits, 500));
    });

    restoreEdits();

    // Animation Builder support
    window.addEventListener('message', (event) => {
      if (event.data?.type === 'getBuilderElements') {
        const selectors = '[data-animatable], [contenteditable], h1, h2, h3, p, li, img, svg, [class*="-box"], [class*="-card"], [class*="-panel"], [class*="-window"], [class*="-item"]';
        const elements = [];
        let idCounter = 1;
        document.querySelectorAll(selectors).forEach(el => {
          const rect = el.getBoundingClientRect();
          if (rect.width < 10 || rect.height < 10) return;
          if (rect.width > 1536 || rect.height > 864) return;
          let buildId = el.getAttribute('data-build-id') || `build-${idCounter++}`;
          el.setAttribute('data-build-id', buildId);
          elements.push({
            id: buildId,
            rect: { x: rect.left, y: rect.top, width: rect.width, height: rect.height },
            tagName: el.tagName.toLowerCase(),
            text: el.textContent?.substring(0, 30) || ''
          });
        });
        window.parent.postMessage({ type: 'builderElements', elements }, '*');
      }
    });
  </script>
</body>
</html>
